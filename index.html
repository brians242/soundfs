<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>overcast, for your past</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    body { cursor: default; }
    #scene { position: fixed; top: 0; left: 0; display: block; }
    /* Clear brush preview cursor (shows brush size/color) */
    #brush-cursor {
      position: fixed;
      left: 0; top: 0;
      width: 18px; height: 18px;
      transform: translate(-9999px, -9999px);
      border-radius: 999px;
      pointer-events: none;
      z-index: 50;
      border: 2px solid rgba(238,232,222,0.75);
      box-shadow: 0 10px 26px rgba(0,0,0,0.28);
      mix-blend-mode: screen;
    }
    #text-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 10;
    }
    #for-you {
      font-family: 'Lora', Georgia, serif;
      font-style: italic; font-weight: 400;
      font-size: clamp(1.5rem, 3.8vw, 3rem);
      color: rgba(238, 232, 222, 0.92);
      opacity: 0; letter-spacing: 0.1em;
      text-shadow: 0 0 50px rgba(255,255,255,0.16);
    }
    #time-display {
      position: fixed; bottom: 1.8rem; right: 2.2rem;
      font-family: 'Lora', Georgia, serif;
      font-style: italic; font-size: 0.7rem;
      color: rgba(210, 206, 198, 0.25);
      pointer-events: none; z-index: 10;
      letter-spacing: 0.06em;
    }

    /* Experience UI (inspired by The Sound of Love's minimal ritual) */
    #ui {
      position: fixed; inset: 0; z-index: 20;
      font-family: 'Lora', Georgia, serif;
      color: rgba(238, 232, 222, 0.92);
      pointer-events: none;
    }
    #ui-center {
      position: fixed; inset: 0;
      display: grid;
      place-items: center;
      padding: 2.2rem;
    }
    #start-card {
      pointer-events: auto;
      text-align: center;
      max-width: 44rem;
      border: 1px solid rgba(238,232,222,0.14);
      background: rgba(10, 10, 10, 0.35);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 1.4rem 1.6rem 1.2rem;
      transform: translateY(10px);
      opacity: 0;
      transition: opacity 900ms ease, transform 900ms ease;
    }
    #start-card.show {
      opacity: 1;
      transform: translateY(0);
    }
    #title {
      font-style: italic;
      font-size: clamp(1.4rem, 4.2vw, 2.4rem);
      letter-spacing: 0.10em;
      color: rgba(238, 232, 222, 0.94);
      margin-bottom: 0.25rem;
      text-shadow: 0 0 45px rgba(255,255,255,0.10);
    }
    #start-btn {
      pointer-events: auto;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 0.95rem;
      padding: 0.85rem 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(238,232,222,0.26);
      color: rgba(238, 232, 222, 0.92);
      background: rgba(30, 30, 30, 0.22);
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }
    #start-btn:hover { transform: translateY(-1px); border-color: rgba(238,232,222,0.44); background: rgba(45, 45, 45, 0.22); }
    #start-hint {
      margin-top: 0.8rem;
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      color: rgba(238, 232, 222, 0.42);
    }
    /* Toolbox (scribbl-ish paint + notes) */
    #toolbox {
      position: fixed;
      left: 1.2rem;
      bottom: 1.2rem;
      width: min(30rem, calc(100vw - 2.4rem));
      pointer-events: auto;
      border: 1px solid rgba(238,232,222,0.14);
      background: rgba(10, 10, 10, 0.32);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 0.85rem 0.9rem;
      color: rgba(238,232,222,0.80);
      box-shadow: 0 18px 60px rgba(0,0,0,0.30);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 650ms ease, transform 650ms ease;
      z-index: 21;
    }
    #toolbox.show { opacity: 1; transform: translateY(0); }
    #tools-row { display:flex; gap:0.65rem; flex-wrap: wrap; align-items: center; }
    .chip {
      user-select: none;
      cursor: pointer;
      padding: 0.45rem 0.65rem;
      border-radius: 999px;
      border: 1px solid rgba(238,232,222,0.22);
      background:
        linear-gradient(0deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.00) 0px, rgba(255,255,255,0.00) 10px, rgba(255,255,255,0.03) 11px);
      color: rgba(238,232,222,0.85);
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      letter-spacing: 0.06em;
      font-size: 0.74rem;
      box-shadow:
        0 10px 26px rgba(0,0,0,0.25),
        0 0 0 2px rgba(0,0,0,0.08) inset;
      transform: rotate(var(--r, -0.6deg));
    }
    .chip[aria-pressed="true"] { border-color: rgba(238,232,222,0.44); background: rgba(55,55,55,0.20); }
    .chip:hover { transform: rotate(var(--r, -0.6deg)) translateY(-1px); }
    #swatches { display:flex; gap:0.45rem; align-items:center; }
    .swatch {
      width: 20px; height: 20px; border-radius: 999px;
      border: 1px solid rgba(238,232,222,0.22);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      cursor: pointer;
    }
    .swatch.selected { outline: 2px solid rgba(238,232,222,0.55); outline-offset: 2px; }
    #brush {
      accent-color: rgba(238,232,222,0.60);
      width: 120px;
    }
    #notes-drawer {
      margin-top: 0.7rem;
      display: none;
      gap: 0.6rem;
    }
    #notes-drawer.show { display: grid; }
    #narrative {
      position: fixed;
      left: 50%;
      bottom: 1.6rem;
      transform: translateX(-50%);
      max-width: min(46rem, calc(100vw - 3rem));
      pointer-events: none;
      text-align: center;
      font-style: italic;
      letter-spacing: 0.04em;
      line-height: 1.7;
      color: rgba(238, 232, 222, 0.0);
      text-shadow: 0 0 55px rgba(255,255,255,0.10);
      transition: color 700ms ease, filter 700ms ease, transform 700ms ease;
      filter: blur(2px);
      z-index: 16;
    }
    #narrative.show {
      color: rgba(238, 232, 222, 0.78);
      filter: blur(0);
      transform: translateX(-50%) translateY(-2px);
    }
    /* Speech-to-text popups */
    #captions {
      position: fixed;
      left: 50%;
      bottom: 0.5rem;
      transform: translateX(-50%);
      width: min(56rem, calc(100vw - 2rem));
      pointer-events: none;
      z-index: 17;
      display: grid;
      gap: 0.4rem;
      justify-items: center;
    }
    .cap {
      max-width: 52rem;
      padding: 0.55rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(238,232,222,0.14);
      background: rgba(10, 10, 10, 0.25);
      backdrop-filter: blur(10px);
      color: rgba(238,232,222,0.78);
      font-style: italic;
      letter-spacing: 0.03em;
      line-height: 1.55;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 500ms ease, transform 500ms ease;
    }
    .cap.show { opacity: 1; transform: translateY(0); }
    /* Past-self cards */
    #cards-panel {
      width: 100%;
      pointer-events: none;
      border: 1px solid rgba(238,232,222,0.14);
      background: rgba(10, 10, 10, 0.35);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 0.9rem 1.0rem;
      color: rgba(238, 232, 222, 0.70);
      letter-spacing: 0.03em;
      line-height: 1.55;
      font-size: 0.78rem;
    }
    #cards-panel.show { pointer-events: auto; }
    #cards-panel h3 {
      font-size: 0.78rem;
      letter-spacing: 0.10em;
      font-weight: 400;
      margin-bottom: 0.55rem;
      color: rgba(238,232,222,0.62);
    }
    #note {
      width: 100%;
      min-height: 7.2rem;
      resize: vertical;
      padding: 0.75rem 0.85rem;
      border-radius: 12px;
      border: 1px solid rgba(238,232,222,0.18);
      outline: none;
      background:
        linear-gradient(0deg, rgba(255,255,255,0.03), rgba(255,255,255,0.03)),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.00) 0px, rgba(255,255,255,0.00) 20px, rgba(255,255,255,0.04) 21px);
      color: rgba(238,232,222,0.86);
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      letter-spacing: 0.02em;
      line-height: 1.6;
    }
    #cards-actions { display:flex; gap:0.6rem; margin-top: 0.7rem; align-items:center; }
    .btn {
      pointer-events: auto;
      user-select: none;
      cursor: pointer;
      padding: 0.55rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(238,232,222,0.22);
      background: rgba(30, 30, 30, 0.18);
      color: rgba(238,232,222,0.88);
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      letter-spacing: 0.06em;
      font-size: 0.78rem;
    }
    .btn:hover { border-color: rgba(238,232,222,0.40); }
    #notes-list {
      margin-top: 0.75rem;
      display: grid;
      gap: 0.55rem;
      max-height: 10.5rem;
      overflow: auto;
      padding-right: 0.2rem;
    }
    .card {
      border-radius: 14px;
      border: 1px solid rgba(238,232,222,0.18);
      background:
        linear-gradient(0deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.00) 0px, rgba(255,255,255,0.00) 22px, rgba(255,255,255,0.05) 23px);
      padding: 0.7rem 0.85rem;
      color: rgba(238,232,222,0.82);
      box-shadow: 0 12px 38px rgba(0,0,0,0.28);
      transform: rotate(var(--r, -0.6deg));
    }
    .card .meta { font-size: 0.66rem; letter-spacing: 0.08em; color: rgba(238,232,222,0.48); margin-bottom: 0.25rem; }
    .card .txt { font-style: italic; }
    #float-cards {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 12;
    }
    .float-card {
      position: absolute;
      width: min(16rem, 46vw);
      border-radius: 14px;
      border: 1px solid rgba(238,232,222,0.16);
      background:
        linear-gradient(0deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.00) 0px, rgba(255,255,255,0.00) 22px, rgba(255,255,255,0.05) 23px);
      color: rgba(238,232,222,0.70);
      padding: 0.7rem 0.85rem;
      box-shadow: 0 18px 55px rgba(0,0,0,0.30);
      transform: translate(-50%, -50%) rotate(var(--r, -1deg));
      opacity: 0;
      filter: blur(1px);
      transition: opacity 900ms ease, transform 28000ms linear, filter 1200ms ease;
    }
    .float-card.show {
      opacity: 1;
      filter: blur(0);
      transform: translate(-50%, -60%) rotate(var(--r, -1deg));
    }
    #scrawls {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 13;
    }
    .scrawl {
      position: absolute;
      width: min(18rem, 54vw);
      border-radius: 16px;
      border: 1px solid rgba(238,232,222,0.16);
      background:
        linear-gradient(0deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.00) 0px, rgba(255,255,255,0.00) 22px, rgba(255,255,255,0.05) 23px);
      color: rgba(238,232,222,0.78);
      padding: 0.75rem 0.9rem;
      box-shadow: 0 18px 55px rgba(0,0,0,0.30);
      transform: rotate(var(--r, -1deg));
      opacity: 0;
      filter: blur(2px);
      transition: opacity 900ms ease, filter 900ms ease;
    }
    .scrawl.show { opacity: 1; filter: blur(0); }
    .scrawl .meta { font-size: 0.66rem; letter-spacing: 0.09em; opacity: 0.55; margin-bottom: 0.25rem; }
    .scrawl .txt { font-style: italic; }
    #memory {
      position: fixed;
      left: 50%;
      bottom: 1.6rem;
      transform: translateX(-50%);
      max-width: min(44rem, calc(100vw - 3rem));
      text-align: center;
      pointer-events: none;
      font-style: italic;
      letter-spacing: 0.05em;
      line-height: 1.65;
      color: rgba(238, 232, 222, 0.0);
      text-shadow: 0 0 45px rgba(255,255,255,0.09);
      transition: color 800ms ease, filter 800ms ease;
      filter: blur(2px);
      z-index: 15;
    }
    #memory.show {
      color: rgba(238, 232, 222, 0.74);
      filter: blur(0);
    }
  </style>
  <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="brush-cursor"></div>
  <div id="text-overlay"><div id="for-you">this is for you</div></div>
  <div id="time-display"></div>
  <div id="ui" aria-hidden="false">
    <div id="ui-center">
      <div id="start-card">
        <div id="title">overcast,<br/>for your past.</div>
        <button id="start-btn">Listen</button>
      </div>
    </div>
    <div id="narrative"></div>
  </div>
  <div id="float-cards"></div>
  <div id="scrawls"></div>
  <div id="captions"></div>
  <div id="toolbox" aria-hidden="true">
    <div id="tools-row">
      <div id="swatches"></div>
      <input id="brush" type="range" min="1" max="28" value="7" />
      <button class="chip" id="text-tool" aria-pressed="false">text</button>
      <button class="chip" id="eraser" aria-pressed="false">eraser</button>
      <button class="chip" id="undo">undo</button>
      <button class="chip" id="clear-draw">clear</button>
      <button class="chip" id="send-doodle">send doodle</button>
      <button class="chip" id="notes-toggle" aria-pressed="false">notes</button>
    </div>
    <div id="notes-drawer">
      <div id="cards-panel" aria-hidden="false" class="show">
        <h3>to your past self</h3>
        <div style="opacity:0.78;">
          write a small note. each card changes the theme — as if sound can travel backward.
        </div>
        <div style="height:0.65rem;"></div>
        <textarea id="note" placeholder="dear me, i hope you…"></textarea>
        <div id="cards-actions">
          <button class="btn" id="submit-note">send</button>
          <button class="btn" id="clear-notes">clear</button>
          <div style="margin-left:auto; opacity:0.55; letter-spacing:0.08em; font-size:0.66rem;" id="note-count"></div>
        </div>
        <div id="notes-list"></div>
      </div>
    </div>
  </div>

<script>
'use strict';

const pageLoadTime = performance.now();  // for wait-time measurement
let   micLevel     = 0;                  // updated by mic analyser; read by visual loop
let   musicLevel   = 0;                  // updated by Tone.Meter; read by visual loop
let   soundLevel   = 0;                  // combined, smoothed visual driver
let   camLevel     = 0;                  // webcam brightness (0–1)
let   camMotion    = 0;                  // webcam motion estimate (0–1)
let   camFocusX    = 0.5;                // webcam-derived focus point (0–1)
let   camFocusY    = 0.5;
let   camFocusConf = 0;                  // 0–1 confidence

let   revealLevel  = 0;                  // 0–1: sound enables imagery
let   blinkOpen    = 0;                  // 0–1: eyelids open amount
let   started      = false;              // has user begun
let   nextBlinkAt  = 0;                  // ms timestamp for next natural blink
let   blinkPhase   = 0;                  // 0..1 blink animation phase (only when blinking)

// Always vary per refresh/open (while still being influenced by time/signals)
const SESSION_SEED = (() => {
  try {
    const u = new Uint32Array(2);
    crypto.getRandomValues(u);
    return (u[0] ^ (u[1] << 1)) >>> 0;
  } catch (e) {
    return (Math.floor(Math.random() * 0xFFFFFFFF) >>> 0);
  }
})();

// UI elements
const uiEl = document.getElementById('ui');
const startCard = document.getElementById('start-card');
const startBtn = document.getElementById('start-btn');
const narrativeEl = document.getElementById('narrative');
const captionsEl = document.getElementById('captions');
const toolboxEl = document.getElementById('toolbox');
const swatchesEl = document.getElementById('swatches');
const brushEl = document.getElementById('brush');
const textToolEl = document.getElementById('text-tool');
const eraserEl = document.getElementById('eraser');
const undoEl = document.getElementById('undo');
const clearDrawEl = document.getElementById('clear-draw');
const sendDoodleEl = document.getElementById('send-doodle');
const notesToggleEl = document.getElementById('notes-toggle');
const notesDrawerEl = document.getElementById('notes-drawer');
const noteEl = document.getElementById('note');
const submitNoteBtn = document.getElementById('submit-note');
const clearNotesBtn = document.getElementById('clear-notes');
const notesListEl = document.getElementById('notes-list');
const noteCountEl = document.getElementById('note-count');
const floatCardsEl = document.getElementById('float-cards');
const scrawlsEl = document.getElementById('scrawls');
const brushCursorEl = document.getElementById('brush-cursor');

// ── Paint (scribbl-ish) ─────────────────────────────────────────────────────
// Initialized after canvas exists.
let paintC = null;
let paintCtx = null;
let paintStrokes = [];
let paintIsDown = false;
let paintColor = '#f0e8de';
let paintSize = 7;
let paintEraser = false;
let paintTextMode = false;
let activeTextBox = null;
function updateBrushCursor() {
  if (!brushCursorEl) return;
  const sz = Math.max(6, Math.min(44, (paintSize || 7) * 1.6));
  brushCursorEl.style.width = `${sz}px`;
  brushCursorEl.style.height = `${sz}px`;
  brushCursorEl.style.borderColor = paintEraser ? 'rgba(238,232,222,0.35)' : 'rgba(238,232,222,0.82)';
  brushCursorEl.style.background = paintEraser ? 'rgba(0,0,0,0.0)' : `${paintColor}22`;
}

function initPaint() {
  if (paintC) return;
  paintC = document.createElement('canvas');
  paintCtx = paintC.getContext('2d');

  function resizePaint() {
    paintC.width = canvas.width;
    paintC.height = canvas.height;
  }
  resizePaint();
  window.addEventListener('resize', resizePaint);

  function renderPaint() {
    paintCtx.clearRect(0, 0, paintC.width, paintC.height);
    for (const s of paintStrokes) {
      paintCtx.save();
      paintCtx.lineCap = 'round';
      paintCtx.lineJoin = 'round';
      paintCtx.globalCompositeOperation = s.eraser ? 'destination-out' : 'source-over';
      paintCtx.strokeStyle = s.color;
      paintCtx.lineWidth = s.size;
      paintCtx.globalAlpha = s.eraser ? 1 : 0.80;
      paintCtx.beginPath();
      for (let i = 0; i < s.pts.length; i++) {
        const p = s.pts[i];
        if (i === 0) paintCtx.moveTo(p.x, p.y);
        else paintCtx.lineTo(p.x, p.y);
      }
      paintCtx.stroke();
      paintCtx.restore();
    }
  }

  function addStrokePoint(x, y) {
    const cur = paintStrokes[paintStrokes.length - 1];
    if (!cur) return;
    cur.pts.push({ x, y });
    renderPaint();
  }

  function pointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function beginStroke(x, y) {
    paintStrokes.push({
      color: paintColor,
      size: paintSize,
      eraser: paintEraser,
      pts: [{ x, y }],
    });
    paintIsDown = true;
    renderPaint();
    narrativePush('you leave a mark. the sky keeps it.');
    nudgeMood(0.05);
  }

  function endStroke() {
    paintIsDown = false;
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (toolboxEl && toolboxEl.contains(e.target)) return;
    const p = pointerPos(e);
    if (paintTextMode) {
      spawnTextBox(p.x, p.y);
      return;
    }
    beginStroke(p.x, p.y);
  }, { passive: true });

  canvas.addEventListener('pointermove', (e) => {
    if (!paintIsDown) return;
    const p = pointerPos(e);
    addStrokePoint(p.x, p.y);
  }, { passive: true });

  window.addEventListener('pointerup', endStroke, { passive: true });

  function initSwatches() {
    const colors = [
      '#f0e8de', '#ffffff', '#cfe8ff', '#9ad3ff', '#70b2ff',
      '#b8f0d7', '#8ad7b2', '#ffe3b0', '#ffcc7a', '#f6a0c7',
      '#c9b2ff', '#23262b'
    ];
    swatchesEl.innerHTML = '';
    colors.forEach((c) => {
      const s = document.createElement('div');
      s.className = 'swatch';
      s.style.background = c;
      s.addEventListener('click', (e) => {
        e.stopPropagation();
        paintColor = c;
        paintEraser = false;
        eraserEl.setAttribute('aria-pressed', 'false');
        [...swatchesEl.querySelectorAll('.swatch')].forEach(el => el.classList.remove('selected'));
        s.classList.add('selected');
        if (c === '#23262b') nudgeMood(-0.08); else nudgeMood(0.03);
        updateBrushCursor();
      }, { passive: false });
      swatchesEl.appendChild(s);
    });
    const first = swatchesEl.querySelector('.swatch');
    if (first) first.classList.add('selected');
  }
  initSwatches();

  brushEl.addEventListener('input', () => {
    paintSize = Number(brushEl.value) || 7;
    updateBrushCursor();
  });
  eraserEl.addEventListener('click', (e) => {
    e.stopPropagation();
    paintEraser = !paintEraser;
    eraserEl.setAttribute('aria-pressed', paintEraser ? 'true' : 'false');
    updateBrushCursor();
  });
  undoEl.addEventListener('click', (e) => {
    e.stopPropagation();
    paintStrokes.pop();
    renderPaint();
  });
  clearDrawEl.addEventListener('click', (e) => {
    e.stopPropagation();
    paintStrokes = [];
    renderPaint();
  });

  textToolEl.addEventListener('click', (e) => {
    e.stopPropagation();
    paintTextMode = !paintTextMode;
    textToolEl.setAttribute('aria-pressed', paintTextMode ? 'true' : 'false');
    // turn off eraser when entering text mode
    if (paintTextMode) {
      paintEraser = false;
      eraserEl.setAttribute('aria-pressed', 'false');
    }
    narrativePush(paintTextMode ? 'place a textbox in the sky.' : 'back to drawing.');
  });

  sendDoodleEl.addEventListener('click', async (e) => {
    e.stopPropagation();
    await startAudio();
    if (!paintC) return;
    // snapshot paint canvas and pin it as a scrawled “sent doodle”
    const url = paintC.toDataURL('image/png');
    pinDoodle(url);
    bumpContribution(2);
    narrativePush('you sent a doodle to the past.');
    if (themeEngine && themeEngine.applyNote) themeEngine.applyNote(url.slice(0, 220));
  });
  notesToggleEl.addEventListener('click', (e) => {
    e.stopPropagation();

    notesToggleEl.setAttribute('aria-pressed', open ? 'true' : 'false');
    notesDrawerEl.classList.toggle('show', open);
    if (open) setTimeout(() => noteEl && noteEl.focus(), 60);
  });

  // expose for renderer
  window.__renderPaint = renderPaint;
  updateBrushCursor();
}

function spawnTextBox(x, y) {

  const ta = document.createElement('textarea');
  ta.placeholder = 'scribble… (ctrl/cmd+enter to send)';
  ta.style.position = 'fixed';
  ta.style.left = `${Math.round(x)}px`;
  ta.style.top = `${Math.round(y)}px`;
  ta.style.transform = `translate(-10%, -10%) rotate(${(Math.random()*2-1)*2.0}deg)`;
  ta.style.width = 'min(18rem, 58vw)';
  ta.style.minHeight = '4.8rem';
  ta.style.padding = '0.7rem 0.85rem';
  ta.style.borderRadius = '16px';
  ta.style.border = '1px solid rgba(238,232,222,0.18)';
  ta.style.background =
    'linear-gradient(0deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)), repeating-linear-gradient(0deg, rgba(255,255,255,0.00) 0px, rgba(255,255,255,0.00) 22px, rgba(255,255,255,0.05) 23px)';
  ta.style.color = 'rgba(238,232,222,0.88)';

  ta.style.zIndex = '40';

  const commit = async () => {
    const txt = (ta.value || '').trim();
    if (!txt) { ta.remove(); activeTextBox = null; return; }
    await startAudio();
    pinScrawl(txt);
    floatCard(txt);
    bumpContribution(2);
    if (themeEngine && themeEngine.applyNote) themeEngine.applyNote(txt);
    narrativePush('you left words where clouds can find them.');

    activeTextBox = null;
  };

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      ta.remove(); activeTextBox = null;
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      commit();

  });

// ── PRNG ───────────────────────────────────────────────────────────────────
function mulberry32(a) {
  return function() {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ── COLOR ──────────────────────────────────────────────────────────────────
function hex2rgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function rgba(rgb, a) {
  return `rgba(${Math.round(rgb[0])},${Math.round(rgb[1])},${Math.round(rgb[2])},${a.toFixed(3)})`;
}
// Blend color toward a chalky off-white — keeps palette but adds crayon softness
function chalky(rgb, amt = 0.15) {
  return [
    Math.round(rgb[0] + (235 - rgb[0]) * amt),
    Math.round(rgb[1] + (235 - rgb[1]) * amt),
    Math.round(rgb[2] + (235 - rgb[2]) * amt),
  ];
}

const pageNow   = new Date();
const HOUR      = pageNow.getHours();
const MONTH     = pageNow.getMonth();   // 0-indexed
const TZ_OFFSET = pageNow.getTimezoneOffset();

const SEASON = MONTH >= 2 && MONTH <= 4  ? 'spring'
             : MONTH >= 5 && MONTH <= 7  ? 'summer'
             : MONTH >= 8 && MONTH <= 10 ? 'autumn'
             : 'winter';

// Mouse speed — tracked for first 5 seconds, then locked
let mouseDist = 0, lastMX = null, lastMY = null;
let mouseSpeed = 'slow';
let pointerX = 0.5, pointerY = 0.5;

document.addEventListener('mousemove', e => {
  if (lastMX !== null) {
    const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
    mouseDist += Math.sqrt(dx * dx + dy * dy);
  }
  lastMX = e.clientX; lastMY = e.clientY;
  pointerX = e.clientX / Math.max(1, window.innerWidth);
  pointerY = e.clientY / Math.max(1, window.innerHeight);
  if (brushCursorEl) {
    brushCursorEl.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  const t = e.touches && e.touches[0];
  if (!t) return;
  pointerX = t.clientX / Math.max(1, window.innerWidth);
  pointerY = t.clientY / Math.max(1, window.innerHeight);
}, { passive: true });

setTimeout(() => {
  if      (mouseDist < 50)  mouseSpeed = 'still';
  else if (mouseDist < 300) mouseSpeed = 'slow';
  else if (mouseDist < 800) mouseSpeed = 'moderate';
  else                      mouseSpeed = 'fast';
}, 5000);

function getSeedNum() {
  const si = ['spring','summer','autumn','winter'].indexOf(SEASON);
  const mi = Math.max(0, ['still','slow','moderate','fast'].indexOf(mouseSpeed));
  return (
    ((HOUR * 1000000) + (si * 100000) + (Math.abs(TZ_OFFSET % 1000) * 100) + (mi * 10) + (SESSION_SEED % 100000)) >>> 0
  );
}

function getTimeOfDay(h) {
  if (h >= 5  && h < 11) return 'morning';
  if (h >= 11 && h < 17) return 'afternoon';
  if (h >= 17 && h < 21) return 'evening';
  return 'night';
}

const TOD    = getTimeOfDay(HOUR);
const palDef = PALETTES[TOD][SEASON];
const pal = {
  sky:      palDef.sky.map(hex2rgb),
  ground:   hex2rgb(palDef.ground),
  dark:     hex2rgb(palDef.dark),
  cloud:    palDef.cloud,
  particle: palDef.particle,

// Requested feel: blue sky + sun out (not too sunny). We keep seasonal tint mostly in clouds/particles,
// but bias the sky toward soft blue unless it's deep night.
const BLUE_SKY = {
  top: [120, 170, 220],
  mid: [160, 205, 238],
  bot: [205, 232, 248],
};
// User request: "more lively cloudy sunny day" — always present as day.
const FORCE_DAY = true;
if (FORCE_DAY) {
  pal.sky = [BLUE_SKY.top, BLUE_SKY.mid, BLUE_SKY.bot];
  pal.cloud = chalky([245, 248, 252], 0.08);
}

let mood = { val: 0.0, target: 0.0 }; // -1 negative, +1 positive
function nudgeMood(x) {
  mood.target = Math.max(-1, Math.min(1, mood.target + x));
}

let contribution = { val: 0, target: 0 };
function bumpContribution(n = 1) {
  contribution.target = Math.max(0, Math.min(40, contribution.target + n));
}

// ── CANVAS ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('scene');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();

// Now that canvas exists, initialize paint tools.
initPaint();

// ── SCENE STATE ────────────────────────────────────────────────────────────
let rand;
let clouds       = [];
let particles    = [];
let grass        = [];
let focal        = null;
let groundJitter = [];   // stable wobbly horizon offsets, rebuilt on initScene
let view         = { tx: 0, ty: 0, rot: 0, fov: 520, cx: 0, cy: 0 };
let sun          = null;
let wind         = { x: 0.0, y: 0.0 };
let birds        = [];

let camVideo = null;
let camStream = null;
let camC = null;
let camCtx = null;
let camPrev = null;

function initScene() {
  const W = canvas.width, H = canvas.height;
  rand = mulberry32(getSeedNum());

  // ─ Clouds ─
  // Perspective-y "looking up" feeling: more clouds, each with depth (z) for 2.5D parallax.
  const nClouds  = { spring:9, summer:8, autumn:10, winter:11 }[SEASON] + (rand() > 0.5 ? 1 : 0);
  const cloudSpd = { still:0.018, slow:0.030, moderate:0.044, fast:0.060 }[mouseSpeed] ?? 0.030;

  clouds = [];
  for (let i = 0; i < nClouds; i++) {
    const cw  = rand() * 280 + 120;
    const ch  = rand() * 70  + 35;
    // Lumpy outline polygon — 18 points, irregular radius at each → child-drawn cloud shape
    const nPts = 18;
    const pts  = [];
    for (let j = 0; j < nPts; j++) {
      const angle = (j / nPts) * Math.PI * 2;
      const bump  = 0.70 + rand() * 0.48;
      pts.push({
        angle,
        rx:  Math.cos(angle) * cw * 0.5 * bump,
        ry:  Math.sin(angle) * ch * 0.5 * bump,
        wX:  (rand() - 0.5) * 7,    // fixed hand-drawn jitter baked in at init
        wY:  (rand() - 0.5) * 5,
      });
    }
    // more far clouds than near; but include a few very close for obvious parallax
    const z = (i < 2 && rand() > 0.35)
      ? Math.min(0.22, Math.max(0.05, rand() * 0.22))
      : Math.min(1, Math.max(0, Math.pow(rand(), 1.75)));
    clouds.push({
      x:      (rand() - 0.5) * W * 1.25,
      y:      (rand() - 0.5) * H * 0.95,
      z,
      speed:  (rand() * 0.6 + 0.7) * cloudSpd * (0.35 + (1 - z) * 0.9),
      animPh: rand() * Math.PI * 2,
      pts,
    });
  }

  // ─ Particles ─
  particles = [];
  const nPart = Math.floor(34 + rand() * 22);
  for (let i = 0; i < nPart; i++) {
    const z = Math.min(1, Math.max(0, Math.pow(rand(), 1.2)));
    particles.push({
      x:  (rand() - 0.5) * W * 1.15,
      y:  (rand() - 0.5) * H * 1.10,
      z,
      r:  (rand() * 1.5 + 0.5) * (0.6 + (1 - z) * 0.9),
      vy: (rand() * 0.18 + 0.06) * (0.35 + (1 - z) * 0.9),
      ph: rand() * Math.PI * 2,
      fx: rand() * 0.007 + 0.003,
      ax: rand() * 22 + 6,
      op: rand() * 0.20 + 0.04,
    });
  }

  // ─ Grass ─
  grass = [];
  groundJitter = [];

  // ─ Wind ─
  wind = {
    x: (rand() * 2 - 1) * (0.65 + rand() * 0.75),
    y: (rand() * 2 - 1) * (0.12 + rand() * 0.20),
  };

  // ─ Birds (more lively day) ─
  birds = [];
  const nBirds = Math.floor(8 + rand() * 10);
  for (let i = 0; i < nBirds; i++) {
    const z = Math.min(1, Math.max(0, Math.pow(rand(), 1.45)));
    birds.push({
      x: (rand() - 0.5) * W * 1.4,
      y: (rand() - 0.5) * H * 0.65 - H * 0.10,
      z,
      sp: (0.35 + (1 - z) * 0.95) * (0.55 + rand() * 0.75),
      ph: rand() * Math.PI * 2,
      s:  0.7 + rand() * 1.3,
    });
  }

  // ─ Focal element (seeded from TZ offset) ─
  const fTypes = ['bird', 'sun', 'constellation'];
  const fType  = fTypes[Math.floor(Math.abs(TZ_OFFSET) / 60) % 3];

  if (fType === 'bird') {
    const dir = rand() > 0.5 ? 1 : -1;
    focal = {
      type:  'bird',
      x:     dir > 0 ? -70 : W + 70,
      y:     H * (0.10 + rand() * 0.34),
      dir,
      speed: rand() * 0.30 + 0.12,
      ph:    rand() * Math.PI * 2,
    };
  } else if (fType === 'sun') {
    focal = {
      type: 'sun',
      x:    W * (0.2 + rand() * 0.6),
      y:    H * (0.08 + rand() * 0.28),
      r:    rand() * 45 + 55,
      ph:   rand() * Math.PI * 2,
    };
  } else {
    const stars = [];
    for (let i = 0; i < Math.floor(rand() * 9) + 6; i++) {
      stars.push({
        dx: (rand() - 0.5) * 96,
        dy: (rand() - 0.5) * 72,
        r:  rand() * 2.0 + 0.5,
        ph: rand() * Math.PI * 2,
      });
    }
    focal = {
      type:  'constellation',
      x:     W * (0.25 + rand() * 0.5),
      y:     H * (0.14 + rand() * 0.30),
      stars,
      ph:    rand() * Math.PI * 2,
    };
  }

  // Always have a gentle sun when we're in the "blue sky" mode.
  // (Not too sunny: low saturation + soft halo.)
  sun = FORCE_DAY ? {
    x:  W * (0.68 + (rand() - 0.5) * 0.18),
    y:  H * (0.12 + (rand() - 0.5) * 0.10),
    r:  46 + rand() * 34,
    ph: rand() * Math.PI * 2,
  } : null;

  // View (lying down, looking up): camera centered slightly below middle so "sky dome" reads.
  view.cx  = W * 0.5;
  view.cy  = H * 0.56;
  view.fov = Math.max(420, Math.min(760, Math.min(W, H) * 0.78));
}

initScene();
window.addEventListener('resize', () => { resizeCanvas(); initScene(); });

// ── DRAW FUNCTIONS (hand-drawn crayon aesthetic) ───────────────────────────

function drawBackground() {
  const W = canvas.width, H = canvas.height;
  // Soft sky gradient (helps "looking up" depth read) + slight sound tint
  const s = soundLevel;
  contribution.val = contribution.val * 0.94 + contribution.target * 0.06;
  const c = Math.max(0, Math.min(1, contribution.val / 18)); // 0..1
  // Mood tint: negative notes pull cooler/darker; positive notes warm/lift.
  mood.val = mood.val * 0.94 + mood.target * 0.06;
  const m = mood.val;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  // "Not too sunny": keep it airy, add only a gentle warm lift with sound.
  const top = chalky(pal.sky[0], 0.10 + s * 0.05 + Math.max(0, m) * 0.06 + c * 0.10);
  const mid = chalky(pal.sky[1], 0.08 + s * 0.04 + Math.max(0, m) * 0.05 + c * 0.09);
  const bot = chalky(pal.sky[2], 0.10 + s * 0.05 + Math.max(0, m) * 0.06 + c * 0.10);
  g.addColorStop(0.00, rgba(top, 1));
  g.addColorStop(0.55, rgba(mid, 1));
  g.addColorStop(1.00, rgba(bot, 1));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Negative tint overlay (subtle)
  if (m < -0.05) {
    ctx.fillStyle = `rgba(20, 40, 70, ${Math.min(0.16, (-m) * 0.12).toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
  // Contribution brightening (subtle “you’re making it brighter”)
  if (c > 0.02) {
    ctx.fillStyle = `rgba(255, 255, 255, ${(c * 0.055).toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
  // Crayon texture: short roughly-horizontal strokes at random y positions
  for (let i = 0; i < 32; i++) {
    const y   = Math.random() * H * 0.83;
    const col = y < H * 0.42 ? chalky(pal.sky[0], 0.18) : chalky(pal.sky[2], 0.18);
    const len = W * (0.12 + Math.random() * 0.42);
    const x0  = Math.random() * (W - len);
    ctx.strokeStyle = rgba(col, 0.04 + Math.random() * 0.04);
    ctx.lineWidth   = 0.7 + Math.random() * 1.1;
    ctx.beginPath();
    ctx.moveTo(x0,       y + (Math.random()-0.5)*2.5);
    ctx.lineTo(x0 + len, y + (Math.random()-0.5)*2.5);
    ctx.stroke();
  }
}

function project(x, y, z) {
  // Simple 2.5D projection: z in [0..1], 0 = near, 1 = far
  // More obvious parallax: stretch depth effect a bit.
  const depth = 0.42 + z * 1.55;
  const px = view.cx + (x + view.tx) / depth;
  const py = view.cy + (y + view.ty) / depth;
  const sc = view.fov / (view.fov + z * 1200);
  return { x: px, y: py, sc };
}

function drawSun(t) {
  if (!sun) return;
  const s = soundLevel;
  const pulse = 1 + Math.sin(t * 0.00055 + sun.ph) * (0.02 + s * 0.06);
  const r = sun.r * pulse;

  // Halo
  const halo = ctx.createRadialGradient(sun.x, sun.y, r * 0.2, sun.x, sun.y, r * (2.6 + s * 0.6));
  halo.addColorStop(0.0, `rgba(255, 245, 220, ${ (0.10 + s * 0.12).toFixed(3) })`);
  halo.addColorStop(0.35, `rgba(255, 245, 220, ${ (0.06 + s * 0.08).toFixed(3) })`);
  halo.addColorStop(1.0, 'rgba(255, 245, 220, 0)');
  ctx.fillStyle = halo;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Disc (hand-drawn wobble)
  const nPts = 26;
  ctx.fillStyle = `rgba(255, 248, 232, ${ (0.26 + s * 0.12).toFixed(3) })`;
  ctx.strokeStyle = `rgba(255, 248, 232, ${ (0.18 + s * 0.10).toFixed(3) })`;
  ctx.lineWidth = 1.0;
  ctx.beginPath();
  for (let i = 0; i <= nPts; i++) {
    const a = (i / nPts) * Math.PI * 2;
    const rr = r * (0.92 + Math.sin(a * 3.4 + sun.ph) * 0.05 + (Math.random() - 0.5) * 0.03);
    const x = sun.x + Math.cos(a) * rr + (Math.random() - 0.5) * 1.6;
    const y = sun.y + Math.sin(a) * rr * 0.92 + (Math.random() - 0.5) * 1.6;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function drawCloudSketchToFocus(t) {
  // When music swells, clouds sketch toward a camera-derived focus point
  // (making sound feel "in control" without drawing a literal silhouette).
  const s = soundLevel;
  if (s < 0.12) return;
  const w = canvas.width, h = canvas.height;
  const ox = w * (0.30 + camFocusX * 0.40);
  const oy = h * (0.22 + camFocusY * 0.52);
  const nLines = Math.floor(3 + s * 10);
  const col = pal.cloud.map(v => Math.max(0, v - 20));

  ctx.save();
  ctx.globalAlpha = (0.04 + s * 0.18) * (0.35 + camFocusConf * 0.9);
  ctx.strokeStyle = rgba(col, 1);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (let i = 0; i < nLines; i++) {
    const c = clouds[Math.floor(Math.random() * clouds.length)];
    if (!c) continue;
    const p = project(c.x, c.y, c.z);
    const tx = ox + (Math.random() - 0.5) * 80;
    const ty = oy + (Math.random() - 0.5) * 55;
    ctx.lineWidth = 0.8 + (1 - c.z) * 1.6 + s * 1.4;
    ctx.beginPath();
    ctx.moveTo(p.x + (Math.random() - 0.5) * 18, p.y + (Math.random() - 0.5) * 18);
    ctx.quadraticCurveTo(
      (p.x + tx) * 0.5 + (Math.random() - 0.5) * 55,
      (p.y + ty) * 0.5 + (Math.random() - 0.5) * 45,
      tx, ty
    );
    ctx.stroke();
  }
  ctx.restore();
}

function drawBirds(t) {
  // Simple crayon "V" birds, drifting with wind + parallax.
  const s = soundLevel;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  birds.sort((a, b) => b.z - a.z);
  birds.forEach(b => {
    b.x += (wind.x * 0.35 + b.sp) * (0.55 + s * 0.8);
    b.y += wind.y * 0.10;
    const W = canvas.width;
    if (b.x >  W * 0.95) b.x = -W * 0.95;
    const p = project(b.x, b.y + Math.sin(t * 0.0009 + b.ph) * (3 + s * 5), b.z);
    const near = 1 - b.z;
    const size = (7 + near * 16) * b.s * p.sc;
    const flap = Math.sin(t * 0.003 + b.ph) * (0.35 + near * 0.55);
    ctx.globalAlpha = 0.18 + near * 0.28;
    ctx.strokeStyle = rgba(pal.dark, 0.9);
    ctx.lineWidth = 1.0 + near * 1.0 + s * 0.5;
    ctx.beginPath();
    ctx.moveTo(p.x - size, p.y);
    ctx.quadraticCurveTo(p.x - size * 0.3, p.y - size * (0.45 + flap), p.x, p.y);
    ctx.quadraticCurveTo(p.x + size * 0.3, p.y - size * (0.45 + flap), p.x + size, p.y);
    ctx.stroke();
  });
  ctx.restore();
}

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

function smoothstep(a, b, x) {
  const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
  return t * t * (3 - 2 * t);
}

function updateBlinkAndReveal(t) {
  const s = soundLevel;
  const activity = Math.max(s, micLevel * 0.85, camMotion * 0.95);

  // Sound enables imagery (starts black until sound arrives).
  const targetReveal = smoothstep(0.03, 0.22, s);
  revealLevel = revealLevel * 0.94 + targetReveal * 0.06;

  // After enough offerings (notes/doodles/textboxes), the world stays open.
  if ((contribution && contribution.target >= 5) || (contribution && contribution.val >= 5)) {
    blinkOpen = 1;
    revealLevel = Math.max(revealLevel, 0.98);
    blinkPhase = 0;
    return;
  }

  // "First open": start closed, open once (no constant blinking).
  // After that: occasional natural blink every ~12–26s, slightly influenced by activity.
  const openBase = easeInOut(Math.max(0, Math.min(1, (t - 850) / 2600)));
  const open = Math.max(openBase, revealLevel * 0.98);

  if (!nextBlinkAt) {
    nextBlinkAt = t + 7500; // don't blink immediately
  }

  // Trigger a blink sometimes once the eyes are open enough.
  if (open > 0.78 && blinkPhase <= 0 && t > nextBlinkAt) {
    blinkPhase = 0.001;
    // Longer gap when calm; shorter when active.
    const base = 16000 + (1 - activity) * 8000;
    const jitter = 5000 * (Math.random());
    nextBlinkAt = t + base + jitter;
  }

  // Animate blink (quick close/open ~260ms total)
  let dip = 0;
  if (blinkPhase > 0) {
    blinkPhase += 1 / 16; // ~16 frames
    const p = Math.min(1, blinkPhase);
    // triangle-ish envelope, softened
    const tri = p < 0.5 ? (p / 0.5) : (1 - (p - 0.5) / 0.5);
    dip = Math.pow(tri, 2.2) * (0.28 + activity * 0.22);
    if (blinkPhase >= 1) blinkPhase = 0;
  }

  blinkOpen = Math.max(0, Math.min(1, open - dip));
}

function drawEyelids() {
  // Draw black "eyelids" that open from center (lying down / first blink feel).
  const W = canvas.width, H = canvas.height;
  const o = blinkOpen;
  const closed = 1 - o;
  if (closed <= 0.001) return;

  const edgeSoft = 0.10;
  const gap = Math.max(0, (H * (0.62 + o * 0.36)));
  const topH = (H - gap) * 0.5;
  const botY = H - topH;

  // Top lid
  const gTop = ctx.createLinearGradient(0, topH * (1 - edgeSoft), 0, topH);
  gTop.addColorStop(0, `rgba(0,0,0,${(0.92 * closed).toFixed(3)})`);
  gTop.addColorStop(1, `rgba(0,0,0,${(1.00 * closed).toFixed(3)})`);
  ctx.fillStyle = gTop;
  ctx.fillRect(0, 0, W, topH);

  // Bottom lid
  const gBot = ctx.createLinearGradient(0, botY, 0, botY + topH * edgeSoft);
  gBot.addColorStop(0, `rgba(0,0,0,${(1.00 * closed).toFixed(3)})`);
  gBot.addColorStop(1, `rgba(0,0,0,${(0.92 * closed).toFixed(3)})`);
  ctx.fillStyle = gBot;
  ctx.fillRect(0, botY, W, topH);

  // Full black fade when nearly closed (start of piece)
  if (o < 0.12) {
    ctx.fillStyle = `rgba(0,0,0,${(0.55 + (0.12 - o) * 3.0).toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawMusicInk(t) {
  // A "sound writes the sky" layer: short drifting strokes that intensify with sound.
  const s = soundLevel;
  if (s < 0.04) return;
  const W = canvas.width, H = canvas.height;
  const n = Math.floor(6 + s * 34);
  const col = chalky(pal.cloud, 0.10);
  ctx.save();
  ctx.globalAlpha = (0.018 + s * 0.070) * (0.25 + revealLevel * 0.9);
  ctx.strokeStyle = rgba(col, 1);
  ctx.lineCap = 'round';
  for (let i = 0; i < n; i++) {
    const y = H * (0.08 + Math.random() * 0.70);
    const x0 = Math.random() * W;
    const len = W * (0.05 + Math.random() * 0.16) * (0.55 + s * 0.9);
    const wob = Math.sin(t * 0.0009 + i) * (2 + s * 14);
    ctx.lineWidth = 0.7 + Math.random() * 1.1 + s * 1.3;
    ctx.beginPath();
    ctx.moveTo(x0, y + wob);
    ctx.lineTo(x0 + len, y + wob + (Math.random() - 0.5) * (3 + s * 12));
    ctx.stroke();
  }
  ctx.restore();
}

function drawCloud(c, t) {
  // Animate outline: each point drifts slowly on its own sine
  const s = soundLevel;
  const drift = Math.sin(t * 0.00014 + c.animPh) * (1.8 + s * 3.4);
  const wob = 1.1 + s * 1.4;
  const base = project(c.x, c.y, c.z);
  const pts = c.pts.map(p => {
    const lx = (p.rx + p.wX + Math.sin(t * 0.00019 + p.angle * 1.4 + c.animPh) * 1.3) * base.sc;
    const ly = (p.ry + p.wY + drift) * base.sc;
    return { x: base.x + lx, y: base.y + ly };
  });

  // 1. Flat chalky fill
  const near = 1 - c.z;
  ctx.fillStyle = rgba(chalky(pal.cloud, 0.18 + near * 0.10), 0.68 + near * 0.22);
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fill();

  // 2. Crayon texture strokes (slight bleed beyond outline is part of the look)
  const cx = pts.reduce((acc, p) => acc + p.x, 0) / pts.length;
  const cy = pts.reduce((acc, p) => acc + p.y, 0) / pts.length;
  const rX = c.pts.reduce((m, p) => Math.max(m, Math.abs(p.rx)), 0) * base.sc;
  const rY = c.pts.reduce((m, p) => Math.max(m, Math.abs(p.ry)), 0) * base.sc;
  ctx.lineWidth = 0.65 + near * 0.45;
  for (let i = 0; i < 12; i++) {
    const tx = cx + (Math.random()-0.5) * rX * 1.6;
    const ty = cy + (Math.random()-0.5) * rY * 1.1;
    ctx.strokeStyle = rgba(pal.cloud, (0.045 + Math.random() * 0.04) * (0.7 + near * 0.6));
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx + (Math.random()-0.5) * (18 + 20 * near) * wob, ty + (Math.random()-0.5) * (4 + 5 * near));
    ctx.stroke();
  }

  // 3. Wobbly marker outline — per-vertex jitter every frame for nervous hand-drawn feel
  const outCol = pal.cloud.map(v => Math.max(0, v - 28));
  ctx.strokeStyle = rgba(outCol, 0.28 + near * 0.24 + s * 0.10);
  ctx.lineWidth   = (0.9 + near * 1.2) * (0.9 + Math.random() * 0.45);
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    const jx = (Math.random()-0.5) * (1.2 + near * 1.8 + s * 1.2);
    const jy = (Math.random()-0.5) * (1.2 + near * 1.8 + s * 1.2);
    if (i === 0) ctx.moveTo(p.x + jx, p.y + jy);
    else         ctx.lineTo(p.x + jx, p.y + jy);
  }
  ctx.closePath();
  ctx.stroke();
}

function drawBreathingFrame(t) {
  // Subtle "lying down" frame: soft corners + bottom shade like eyelids/cheeks.
  const W = canvas.width, H = canvas.height;
  const s = soundLevel;
  const rg = ctx.createRadialGradient(view.cx, view.cy, H * 0.10, view.cx, view.cy, H * (0.95 + s * 0.05));
  rg.addColorStop(0.0, 'rgba(0,0,0,0)');
  rg.addColorStop(1.0, `rgba(0,0,0,${(0.16 + s * 0.10).toFixed(3)})`);
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, W, H);

  const bot = ctx.createLinearGradient(0, H * 0.70, 0, H);
  bot.addColorStop(0.0, `rgba(0,0,0,${(0.00).toFixed(3)})`);
  bot.addColorStop(1.0, `rgba(0,0,0,${(0.18 + s * 0.12).toFixed(3)})`);
  ctx.fillStyle = bot;
  ctx.fillRect(0, 0, W, H);
}

function drawParticles(t) {
  particles.forEach(p => {
    const s = soundLevel;
    p.y -= p.vy * (1 + s * 1.25);
    if (p.y < -canvas.height * 0.75) { p.y = canvas.height * 0.75; p.x = (Math.random() - 0.5) * canvas.width * 1.15; }
    const px = p.x + Math.sin(t * p.fx + p.ph) * p.ax * (0.8 + s * 0.7);
    const base = project(px, p.y, p.z);
    const op = Math.min(1, p.op * (1 + s * 1.35 + micLevel * 0.55) * (0.65 + (1 - p.z) * 0.55));
    // Tiny slightly irregular dots — radius and position jitter per frame
    ctx.fillStyle = rgba(pal.particle, op);
    ctx.beginPath();
    ctx.arc(
      base.x + (Math.random()-0.5)*0.9,
      base.y + (Math.random()-0.5)*0.9,
      p.r * base.sc * (0.86 + Math.random() * 0.34),
      0, Math.PI * 2
    );
    ctx.fill();
  });
}

function drawFocal(t) {
  if (!focal) return;
  const W = canvas.width;

  if (focal.type === 'bird') {
    focal.x += focal.speed * focal.dir;
    if (focal.x >  W + 90) focal.x = -90;
    if (focal.x < -90)     focal.x =  W + 90;

    const by   = focal.y + Math.sin(t * 0.00038) * 4;
    const flap = Math.sin(t * 0.0019 + focal.ph) * 6.5;
    // Slightly wobbly crayon wing strokes
    ctx.save();
    ctx.globalAlpha = 0.38;
    ctx.strokeStyle = rgba(pal.dark, 1);
    ctx.lineWidth   = 1.4 + Math.random() * 0.5;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(focal.x - 22 + (Math.random()-0.5)*1.5, by + (Math.random()-0.5)*1.5);
    ctx.quadraticCurveTo(
      focal.x - 11 + (Math.random()-0.5)*2, by + flap + (Math.random()-0.5)*2,
      focal.x       + (Math.random()-0.5)*1.5, by + 3
    );
    ctx.quadraticCurveTo(
      focal.x + 11 + (Math.random()-0.5)*2, by + flap + (Math.random()-0.5)*2,
      focal.x + 22 + (Math.random()-0.5)*1.5, by + (Math.random()-0.5)*1.5
    );
    ctx.stroke();
    ctx.restore();

  } else if (focal.type === 'sun') {
    // Hand-drawn circle: wobbly polygon instead of smooth arc
    const pulse   = Math.sin(t * 0.00068 + focal.ph) * 0.04;
    const fillCol = chalky(pal.cloud, 0.28);
    const nPts    = 22;
    ctx.fillStyle = rgba(fillCol, 0.50 + pulse);
    ctx.beginPath();
    for (let i = 0; i <= nPts; i++) {
      const angle = (i / nPts) * Math.PI * 2;
      const r = focal.r * (0.88 + Math.sin(angle * 3.7 + focal.ph) * 0.09 + (Math.random()-0.5)*0.04);
      const x = focal.x + Math.cos(angle) * r         + (Math.random()-0.5)*2;
      const y = focal.y + Math.sin(angle) * r * 0.86  + (Math.random()-0.5)*2;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = rgba(pal.cloud.map(v => Math.max(0, v - 25)), 0.22);
    ctx.lineWidth = 1.2;
    ctx.stroke();

  } else { // constellation — slightly irregular dot placement
    const gTw = Math.sin(t * 0.0014 + focal.ph) * 0.10;
    focal.stars.forEach(s => {
      const tw    = Math.sin(t * 0.0019 + s.ph) * 0.14;
      const drift = Math.sin(t * 0.00028 + s.ph) * 1.8;
      ctx.beginPath();
      ctx.arc(
        focal.x + s.dx + drift + (Math.random()-0.5)*0.9,
        focal.y + s.dy         + (Math.random()-0.5)*0.9,
        s.r * (0.82 + Math.random() * 0.36),
        0, Math.PI * 2
      );
      ctx.fillStyle = rgba(pal.particle, 0.32 + gTw + tw);
      ctx.fill();
    });
  }
}

function drawVignette() {
  const W = canvas.width, H = canvas.height;
  const rg = ctx.createRadialGradient(W / 2, H / 2, H * 0.25, W / 2, H / 2, H * 0.92);
  rg.addColorStop(0, 'rgba(0,0,0,0)');
  rg.addColorStop(1, `rgba(0,0,0,${(0.12 + soundLevel * 0.10).toFixed(3)})`);
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, W, H);
}

// ── ANIMATION LOOP ─────────────────────────────────────────────────────────
function loop(t) {
  // Smooth sound driver for visuals (music + mic)
  const raw = Math.max(0, Math.min(1, Math.max(musicLevel * 1.15, micLevel * 0.95)));
  soundLevel = soundLevel * 0.92 + raw * 0.08;
  updateBlinkAndReveal(t);

  // Gentle "head sway" camera motion: mostly slow, with sound-driven lift
  const s = soundLevel;
  const lookX = (pointerX - 0.5);
  const lookY = (pointerY - 0.5);
  // Make parallax obvious: look-based pan + larger sway
  view.tx = Math.sin(t * 0.00022) * (26 + s * 70) + lookX * (180 + s * 180);
  view.ty = Math.cos(t * 0.00018) * (18 + s * 60) - s * 34 + lookY * (120 + s * 140);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // The world "arrives" as sound enables it.
  ctx.globalAlpha = 0.10 + revealLevel * 0.90;
  drawBackground();
  // Sun sits behind clouds.
  drawSun(t);
  if (focal && focal.type === 'sun') drawFocal(t);
  // Far → near for cleaner depth read
  clouds.sort((a, b) => b.z - a.z);
  clouds.forEach(c => {
    c.x += c.speed * (0.9 + s * 0.9);
    // wrap in local space (before projection)
    const W = canvas.width;
    if (c.x >  W * 0.85) c.x = -W * 0.85;
    if (c.x < -W * 0.85) c.x =  W * 0.85;
    drawCloud(c, t);
  });
  drawBirds(t);
  drawCloudSketchToFocus(t);
  drawParticles(t);
  if (focal && focal.type !== 'sun') drawFocal(t);    // bird / constellation on top
  drawMusicInk(t);
  drawBreathingFrame(t);
  drawVignette();
  // Composite user paint on top (crayon marks)
  if (paintC) {
    ctx.save();
    ctx.globalAlpha = 0.88;
    ctx.drawImage(paintC, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  drawEyelids();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── TEXT OVERLAY ───────────────────────────────────────────────────────────
const forYouEl = document.getElementById('for-you');
const timeEl   = document.getElementById('time-display');

const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
function fmtTime(d) {
  const day = DAYS[d.getDay()];
  const h   = d.getHours() % 12 || 12;
  const m   = String(d.getMinutes()).padStart(2, '0');
  const ap  = d.getHours() >= 12 ? 'pm' : 'am';
  return `${day}, ${h}:${m}${ap}`;
}
timeEl.textContent = fmtTime(pageNow);
setInterval(() => { timeEl.textContent = fmtTime(new Date()); }, 60000);

// Fade in → stay ~4s → fade out permanently

  forYouEl.style.opacity    = '1';
  setTimeout(() => {
    forYouEl.style.transition = 'opacity 3s ease';
    forYouEl.style.opacity    = '0';

// ── AUDIO ──────────────────────────────────────────────────────────────────

// Root note derived from timezone offset.
// JS getTimezoneOffset(): PST = +480, UTC = 0, UTC+8 = -480
// Spec convention: PST ("−480") → C, UTC → G (7 semitones up)
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function getRootNote() {
  const idx = ((Math.round((480 - TZ_OFFSET) * 7 / 480) % 12) + 12) % 12;
  return NOTE_NAMES[idx] + '4';
}

// Pentatonic scale (major or minor) from a root note string
function buildScale(rootNote, useMinor) {
  const intervals = useMinor ? [0,3,5,7,10,12,15,17] : [0,2,4,7,9,12,14,16];
  try {
    const base = Tone.Frequency(rootNote).toMidi();
    return intervals.map(i => Tone.Frequency(base + i, 'midi').toNote());
  } catch(e) {
    return ['C4','D4','F4','G4','Bb4','C5','D5','F5'];
  }
}

// More "actual musical melodies" (less eerie): major-leaning, gentle chords, lighter reverb.
const MUSIC_MODES = [
  { oscType:'sine',     envAtk:0.02, envRel:0.9,  rhythmFill:0.20, useMinor:false, padColor:'warm' },
  { oscType:'triangle', envAtk:0.04, envRel:1.15, rhythmFill:0.26, useMinor:false, padColor:'airy' },
  { oscType:'sine',     envAtk:0.03, envRel:1.05, rhythmFill:0.18, useMinor:true,  padColor:'warm' },
];

let audioStarted = false;
let masterVol    = null;
let reverbNode   = null;
let meterNode    = null;
let musicFilter  = null;
let camStarted   = false;
let themeEngine  = null; // live “sound-for-someone” theme mutations (notes)

async function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  started = true;

  const waitMs = performance.now() - pageLoadTime;   // how long they waited before clicking

  try { await Tone.start(); } catch(e) { return; }

  // Use a second PRNG stream seeded from the same signals but different salt,
  // so audio choices are independent of scene layout choices.
  const aRand = mulberry32((getSeedNum() ^ 0xCAFEBABE) >>> 0);
  const mode  = MUSIC_MODES[Math.floor(aRand() * MUSIC_MODES.length)];
  const root  = getRootNote();
  const scale = buildScale(root, mode.useMinor);

  // Set BPM early — melody duration calculations depend on it
  Tone.Transport.bpm.value = { still:52, slow:62, moderate:74, fast:86 }[mouseSpeed] ?? 62;

  // ── Shared effects chain ────────────────────────────────────────────────
  // each layer → reverb → eq3 → limiter → masterVol → destination
  masterVol  = new Tone.Volume(-Infinity).toDestination();
  const limiter = new Tone.Limiter(-4).connect(masterVol);
  const eq3     = new Tone.EQ3({ high: -4, mid: 0, low: 1 }).connect(limiter);
  reverbNode    = new Tone.Reverb({ decay: 5.5, wet: 0.34 });
  await reverbNode.ready;
  // A shared filter that we can "play" with interaction.
  musicFilter = new Tone.Filter({ type: 'lowpass', frequency: 2200, rolloff: -12, Q: 0.7 });
  reverbNode.connect(musicFilter);
  musicFilter.connect(eq3);
  meterNode = new Tone.Meter({ channels: 1, smoothing: 0.85 });
  limiter.connect(meterNode);

  function tickMusicMeter() {
    if (meterNode) {
      const db = meterNode.getValue(); // dBFS, typically negative
      const lin = Math.pow(10, (db ?? -Infinity) / 20);
      // emphasize musical motion without being too twitchy
      musicLevel = Math.max(0, Math.min(1, lin * 2.4));
    } else {
      musicLevel = 0;
    }
    requestAnimationFrame(tickMusicMeter);
  }
  tickMusicMeter();

  // ── Layer 1: melodic voice ──────────────────────────────────────────────
  // Tone.Synth → Tone.Chorus → volume node → reverb
  const melVol   = new Tone.Volume(-Infinity).connect(reverbNode);
  const chorus   = new Tone.Chorus({ frequency: 0.45, delayTime: 2.8, depth: 6 }).start();
  chorus.connect(melVol);
  const melSynth = new Tone.Synth({
    oscillator: { type: mode.oscType },
    envelope:   { attack: mode.envAtk, decay: 0.18, sustain: 0.35, release: mode.envRel },
  }).connect(chorus);

  // Counter-melody / sparkle: plucked arpeggio to make it feel more like "music for someone".
  const arpVol = new Tone.Volume(-Infinity).connect(reverbNode);
  const arp = new Tone.PluckSynth({ attackNoise: 0.6, dampening: 3200, resonance: 0.95 }).connect(arpVol);

  // A simple, clearly-melodic system:
  // - chord loop (I–V–vi–IV or i–VI–III–VII)
  // - a dedicated motif (repeats), with gentle variations
  const rootMidi = Tone.Frequency(root).toMidi();
  const majorProg = [
    [0,4,7],   // I
    [7,11,14], // V
    [9,12,16], // vi
    [5,9,12],  // IV
  ];
  const minorProg = [
    [0,3,7],   // i
    [8,12,15], // VI
    [3,7,10],  // III
    [10,14,17] // VII
  ];
  let prog = mode.useMinor ? minorProg : majorProg;
  let chordIdx = 0;
  let lastMidi = rootMidi + 12;

  function chordToNotes(ch) {
    return ch.map(i => Tone.Frequency(rootMidi + i, 'midi').toNote());
  }

  function midiToNote(m) {
    return Tone.Frequency(m, 'midi').toNote();
  }

  // Build a small "theme" (motif) from the scale.
  // This is what makes it feel like "a sound for someone": recognizable, returning, not endlessly random.
  const scaleMidis = scale.map(n => Tone.Frequency(n).toMidi()).sort((a, b) => a - b);
  const motifLen = 5 + Math.floor(aRand() * 2); // 5–6 notes
  const motif = [];
  let idx = Math.floor(aRand() * Math.min(3, Math.max(1, scaleMidis.length - 1)));
  for (let i = 0; i < motifLen; i++) {
    const step = (aRand() < 0.65 ? 1 : 2) * (aRand() < 0.55 ? 1 : -1);
    idx = Math.max(0, Math.min(scaleMidis.length - 1, idx + step));
    motif.push(scaleMidis[idx]);
  }
  // center motif in a singable range (mostly 4–5)
  const motifShift = (m) => {
    let mm = m;
    while (mm < rootMidi + 7) mm += 12;
    while (mm > rootMidi + 24) mm -= 12;
    return mm;
  };
  const motifNotes = motif.map(motifShift);
  let motifPos = 0;

  function pickMelNote(chordNotes) {
    // Prefer chord tones, with occasional passing tone from the scale.
    const chordMidis = chordNotes.map(n => Tone.Frequency(n).toMidi());
    // Most of the time, pull from the motif (recognizable). Sometimes nudge toward chord tones.
    let target = motifNotes[motifPos % motifNotes.length];
    motifPos++;
    if (aRand() < 0.22) {
      // small variation: chord tone near current note
      const near = chordMidis.slice().sort((a, b) => Math.abs(a - target) - Math.abs(b - target));
      target = near[0] ?? target;
    } else if (aRand() < 0.12) {
      // rare passing tone
      target = Tone.Frequency(scale[Math.floor(aRand() * scale.length)]).toMidi();
    }

    // Keep it singable: limit leaps
    while (Math.abs(target - lastMidi) > 7 && aRand() < 0.90) {
      target += (target > lastMidi ? -12 : 12);
    }

    // Octave placement (mostly 4–5)
    while (target < rootMidi + 5) target += 12;
    while (target > rootMidi + 24) target -= 12;

    lastMidi = target;
    return midiToNote(target);
  }

  const melSteps = [
    { dur: '8n' }, { dur: '8n' }, { dur: '4n' }, { dur: '8n' },
    { dur: '8n' }, { dur: '4n' }, { dur: '8n' }, { dur: '8n' },
  ];

  const melSeq = new Tone.Sequence((time, step) => {
    const chord = prog[chordIdx % prog.length];
    const chordNotes = chordToNotes(chord);
    // occasional rest for breath
    // but not too many: keep the theme present
    if (aRand() < 0.14) return;
    const note = pickMelNote(chordNotes);
    // phrase shaping: slightly louder on bar starts, softer elsewhere
    const acc = (step && step.dur === '4n') ? 0.92 : 0.78;
    try { melSynth.triggerAttackRelease(note, step.dur, time, acc); } catch(e) {}
  }, melSteps, '8n');

  const arpSeq = new Tone.Sequence((time) => {
    const chord = prog[(chordIdx - 1 + prog.length) % prog.length];
    const notes = chordToNotes(chord);
    if (aRand() < 0.12) return;
    const pick = notes[Math.floor(aRand() * notes.length)];
    try { arp.triggerAttackRelease(pick, '16n', time, 0.35); } catch(e) {}
  }, Array.from({ length: 16 }, () => 1), '16n');

  // ── Layer 2: rhythmic texture ───────────────────────────────────────────
  // MembraneSynth → volume node → reverb
  // Sparse pattern — feels like footsteps or rain on glass, not a drum beat
  const rhythmVol  = new Tone.Volume(-Infinity).connect(reverbNode);
  const click = new Tone.NoiseSynth({
    noise: { type: 'pink' },
    envelope: { attack: 0.001, decay: 0.06, sustain: 0, release: 0.05 },
  }).connect(rhythmVol);

  const rhPat = Array.from({ length: 16 }, () => aRand() < mode.rhythmFill ? 'x' : null);
  const rhSeq = new Tone.Sequence((time, note) => {
    if (note) { try { click.triggerAttackRelease('16n', time, 0.22); } catch(e) {} }
  }, rhPat, '8n');

  // ── Layer 3: granular/textural pad ─────────────────────────────────────
  // PolySynth → gentle filter → volume node → reverb
  const padVol   = new Tone.Volume(-Infinity).connect(reverbNode);
  const padFilter = new Tone.Filter({ type: 'lowpass', frequency: 2000, rolloff: -12, Q: 0.7 }).connect(padVol);
  const padSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: mode.padColor === 'airy' ? 'sine' : 'triangle' },
    envelope:   { attack: 1.8, decay: 0.6, sustain: 0.62, release: 2.8 },
  }).connect(padFilter);

  function stepChord(time) {
    const chord = prog[chordIdx % prog.length];
    chordIdx++;
    const notes = chordToNotes(chord);
    try { padSynth.triggerAttackRelease(notes, '1m', time, 0.42); } catch(e) {}
  }
  const chordLoop = new Tone.Loop(stepChord, '1m');

  // Note-driven theme mutations ("sound in the past"): each submitted card reshapes motif + timbre.
  // Keep it deterministic per note text, but cumulative over time.
  let themeSeed = (getSeedNum() ^ 0xA11CE) >>> 0;
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function() {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return (h ^= h >>> 16) >>> 0;
    };
  }

  function reseedTheme(extraSeed, strength = 1) {
    themeSeed = (themeSeed ^ extraSeed) >>> 0;
    const r = mulberry32(themeSeed);

    // More distinct changes per note: occasionally flip progression and/or transpose motif.
    const majorVars = [
      majorProg,
      [majorProg[0], majorProg[3], majorProg[1], majorProg[2]], // I–IV–V–vi
      [majorProg[3], majorProg[0], majorProg[2], majorProg[1]], // IV–I–vi–V
    ];
    const minorVars = [
      minorProg,
      [minorProg[0], minorProg[2], minorProg[1], minorProg[3]], // i–III–VI–VII
      [minorProg[1], minorProg[0], minorProg[3], minorProg[2]], // VI–i–VII–III
    ];
    const useMinorNow = r() < (mode.useMinor ? 0.72 : 0.28);
    prog = useMinorNow ? minorVars[Math.floor(r() * minorVars.length)] : majorVars[Math.floor(r() * majorVars.length)];
    chordIdx = 0;

    // Rebuild motif in-place (recognizable theme, new contour)
    const baseIdx = Math.floor(r() * Math.max(1, Math.min(4, scaleMidis.length - 1)));
    let idx = baseIdx;
    const newMotif = [];
    const newLen = 5 + Math.floor(r() * 3); // 5–7
    for (let i = 0; i < newLen; i++) {
      const step = (r() < 0.72 ? 1 : 2) * (r() < 0.58 ? 1 : -1);
      idx = Math.max(0, Math.min(scaleMidis.length - 1, idx + step));
      newMotif.push(motifShift(scaleMidis[idx]));
    }
    // Occasional motif transposition for a clear "new chapter" feel.
    const tr = (r() < 0.40) ? (r() < 0.5 ? -2 : 2) : 0;
    motifNotes.length = 0;
    newMotif.forEach(m => motifNotes.push(m + tr));
    motifPos = 0;

    // Harmonic color drift: pad brightness + reverb + rhythmic density
    const bpm = Tone.Transport.bpm.value;
    Tone.Transport.bpm.rampTo(Math.max(52, Math.min(92, bpm + (r() - 0.5) * 10 * strength)), 0.8);

    if (musicFilter) musicFilter.frequency.rampTo(900 + r() * 4200, 0.7);
    padFilter.frequency.rampTo(1200 + r() * 2400, 0.9);
    reverbNode.wet.value = Math.max(0.14, Math.min(0.66, 0.30 + (r() - 0.5) * 0.28));
    reverbNode.decay = Math.max(3.5, Math.min(8.5, 5.5 + (r() - 0.5) * 3.2));

    // Timbre drift: oscillator + chorus depth (very audible)
    const oscTypes = ['sine','triangle','sine','triangle','sawtooth'];
    try { melSynth.oscillator.type = oscTypes[Math.floor(r() * oscTypes.length)]; } catch(e) {}
    try { chorus.depth = 4 + r() * 12; } catch(e) {}
    try { chorus.frequency.value = 0.25 + r() * 0.9; } catch(e) {}
    try { arp.dampening = 2200 + r() * 5200; } catch(e) {}
    try { arp.resonance = 0.85 + r() * 0.12; } catch(e) {}

    // Make the click texture respond too (more/less “presence”)
    const nextFill = Math.max(0.10, Math.min(0.38, mode.rhythmFill + (r() - 0.5) * 0.12 * strength));
    for (let i = 0; i < rhPat.length; i++) rhPat[i] = (r() < nextFill) ? 'x' : null;

    // Mark the moment (a small swell)
    melVol.volume.rampTo(-18, 0.6);
    arpVol.volume.rampTo(-28, 0.6);
    setTimeout(() => {
      melVol.volume.rampTo(-20, 1.1);
      arpVol.volume.rampTo(-30, 1.1);
    }, 650);
  }

  themeEngine = {
    applyNote(noteText) {
      const clean = String(noteText || '').trim().toLowerCase();
      if (!clean) return;
      const seedFn = xmur3(clean);
      reseedTheme(seedFn(), 1.6);
    }
  };

  // ── Staggered fade-ins ──────────────────────────────────────────────────
  // Longer wait before clicking → longer silence before sound begins
  const extraWait = Math.min(waitMs * 0.5, 8000);
  const base      = 6000 + extraWait;   // minimum 6s after click

  // Even louder overall (still limited): essentially at full level.
  masterVol.volume.rampTo(0, 3.5);

  setTimeout(() => {
    melVol.volume.rampTo(-8, 4.0);
    arpVol.volume.rampTo(-17, 4.0);
    melSeq.start(0);
    arpSeq.start(0);
  }, base);

  setTimeout(() => {
    rhythmVol.volume.rampTo(-20, 3.8);
    rhSeq.start(0);
    Tone.Transport.start();
  }, base + 9000);

  setTimeout(() => {
    padVol.volume.rampTo(-12, 7.5);
    chordLoop.start(0);
  }, base + 22000);

  // ── Tab visibility ──────────────────────────────────────────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      masterVol.volume.rampTo(-Infinity, 3);
      setTimeout(() => Tone.Transport.pause(), 3200);
    } else {
      Tone.Transport.start();
      masterVol.volume.rampTo(0, 3.5);
    }
  });

  // Start mic now that the AudioContext exists
  setupMic();

  // Camera (optional): used to draw the single observer + add presence.
  setupCamera();

  // Tangible mic: speech-to-text captions if supported.
  startSpeechToText();
}

// ── Camera (webcam) ─────────────────────────────────────────────────────────
async function setupCamera() {
  if (camStarted) return;
  camStarted = true;
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    camVideo = document.createElement('video');
    camVideo.playsInline = true;
    camVideo.muted = true;
    camVideo.srcObject = camStream;
    await camVideo.play();

    camC = document.createElement('canvas');
    camC.width = 96;
    camC.height = 72;
    camCtx = camC.getContext('2d', { willReadFrequently: true });
    camPrev = new Uint8ClampedArray(camC.width * camC.height);

    function tickCam() {
      if (!camVideo || !camCtx) return;
      camCtx.drawImage(camVideo, 0, 0, camC.width, camC.height);
      const img = camCtx.getImageData(0, 0, camC.width, camC.height).data;
      let sum = 0;
      let motion = 0;
      let cx = 0, cy = 0, cw = 0;
      let idx = 0;
      for (let i = 0; i < img.length; i += 4) {
        const y = (img[i] * 0.2126 + img[i + 1] * 0.7152 + img[i + 2] * 0.0722) / 255;
        sum += y;
        const d = Math.abs(y - camPrev[idx]);
        motion += d;
        camPrev[idx] = y;
        // crude "silhouette focus": weight darker pixels (likely face/hair) and motion
        const wgt = Math.max(0, (0.62 - y)) * 0.9 + Math.min(0.35, d * 1.8);
        if (wgt > 0) {
          const px = idx % camC.width;
          const py = (idx / camC.width) | 0;
          cx += px * wgt;
          cy += py * wgt;
          cw += wgt;
        }
        idx++;
      }
      const n = camC.width * camC.height;
      const lvl = sum / n;
      const mot = motion / n;
      camLevel = camLevel * 0.90 + lvl * 0.10;
      camMotion = camMotion * 0.88 + Math.min(1, mot * 3.2) * 0.12;
      if (cw > 0.0001) {
        const fx = (cx / cw) / camC.width;
        const fy = (cy / cw) / camC.height;
        camFocusX = camFocusX * 0.90 + fx * 0.10;
        camFocusY = camFocusY * 0.90 + fy * 0.10;
        camFocusConf = camFocusConf * 0.88 + Math.min(1, cw / (n * 0.09)) * 0.12;
      } else {
        camFocusConf = camFocusConf * 0.92;
      }
      requestAnimationFrame(tickCam);
    }
    tickCam();
  } catch (e) {
    // denied/unavailable: keep at 0
    camLevel = 0;
    camMotion = 0;
    camFocusConf = 0;
  }
}

// ── Microphone ─────────────────────────────────────────────────────────────
// Runs inside the Tone AudioContext so the analyser shares the same graph.
// Graceful fallback: mic denied → micLevel stays 0, reverb stays at default wet.
async function setupMic() {
  try {
    const stream   = await navigator.mediaDevices.getUserMedia({ audio: true });
    const rawCtx   = Tone.getContext().rawContext;
    const src      = rawCtx.createMediaStreamSource(stream);
    const analyser = rawCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.85;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    function tick() {
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      micLevel = sum / data.length / 255;   // 0–1, feeds into particle opacity + reverb
      // Louder ambient room → push reverb wetter → more distance, more space
      if (reverbNode) reverbNode.wet.value = Math.max(0.22, Math.min(0.62, 0.34 + micLevel * 0.45));
      requestAnimationFrame(tick);
    }
    tick();
  } catch(e) { /* denied or unavailable — silent fallback */ }
}

// ── Speech-to-text captions (tangible mic) ──────────────────────────────────
let speechRec = null;
let speechActive = false;
function pushCaption(text) {
  if (!captionsEl) return;
  const el = document.createElement('div');
  el.className = 'cap';
  el.textContent = text;
  captionsEl.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  // keep only a few
  while (captionsEl.children.length > 4) captionsEl.removeChild(captionsEl.firstChild);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 650);
  }, 5200);
}

function startSpeechToText() {
  if (speechActive) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  speechRec = new SR();
  speechRec.continuous = true;
  speechRec.interimResults = true;
  speechRec.lang = 'en-US';
  speechActive = true;

  let lastFinal = '';
  speechRec.onresult = (ev) => {
    let interim = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const res = ev.results[i];
      const txt = res[0] && res[0].transcript ? res[0].transcript.trim() : '';
      if (!txt) continue;
      if (res.isFinal) lastFinal = txt;
      else interim = txt;
    }
    const out = (interim || lastFinal).trim();
    if (out && out.length > 1 && out !== '_') {
      pushCaption(out);
    }
  };
  speechRec.onerror = () => { /* ignore */ };
  speechRec.onend = () => {
    // try to keep it alive once started, but don't be aggressive if permissions fail
    if (speechActive) {
      try { speechRec.start(); } catch(e) { speechActive = false; }
    }
  };
  try { speechRec.start(); } catch(e) { speechActive = false; }
}

// Click anywhere to begin. The "this is for you" text is the implicit invitation.
document.addEventListener('click', startAudio, { once: true });

// Interaction: "look" affects the sound too (sound is the centerpiece).
// Pointer up → brighter; pointer down → softer/muffled.
function tickInteraction() {
  if (musicFilter) {
    const y = 1 - pointerY;
    const target = 900 + y * 3800 + soundLevel * 700;
    musicFilter.frequency.rampTo(target, 0.08);
  }
  requestAnimationFrame(tickInteraction);
}
tickInteraction();

// UI behavior
function showStartUI() {

}
showStartUI();

// Toolbox + paint UI

}

// Notes storage + rendering (cards to the past)
const NOTES_KEY = 'soundfs_notes_v1';
function loadNotes() {
  try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '[]') || []; } catch(e) { return []; }
}
function saveNotes(notes) {
  try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch(e) {}
}
function fmtStamp(ms) {
  const d = new Date(ms);
  const h = d.getHours() % 12 || 12;
  const m = String(d.getMinutes()).padStart(2, '0');
  const ap = d.getHours() >= 12 ? 'pm' : 'am';
  return `${d.getMonth()+1}/${d.getDate()}  ${h}:${m}${ap}`;
}
function escapeHtml(s) {
  return String(s)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;')
    .replaceAll('\n', '<br/>');
}

let notes = loadNotes();
function renderNotes() {
  noteCountEl.textContent = `${notes.length} card${notes.length === 1 ? '' : 's'}`;
  notesListEl.innerHTML = '';
  const show = notes.slice(-6).reverse();
  show.forEach(n => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.setProperty('--r', `${(Math.random() * 2 - 1) * 1.2}deg`);
    el.innerHTML = `<div class="meta">${fmtStamp(n.t)}</div><div class="txt">${escapeHtml(n.txt)}</div>`;
    notesListEl.appendChild(el);
  });
}
renderNotes();

function floatCard(txt) {
  const el = document.createElement('div');
  el.className = 'float-card';
  el.style.left = `${window.innerWidth * (0.35 + Math.random() * 0.30)}px`;
  el.style.top = `${window.innerHeight * (0.70 + Math.random() * 0.18)}px`;
  el.style.setProperty('--r', `${(Math.random() * 2 - 1) * 2.2}deg`);
  el.innerHTML = `<div style="font-size:0.68rem; letter-spacing:0.08em; opacity:0.55; margin-bottom:0.25rem;">sent to the past</div><div style="font-style:italic;">${escapeHtml(txt)}</div>`;
  floatCardsEl.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.filter = 'blur(2px)';
    el.style.transform = `translate(-50%, -50%) rotate(${(Math.random()*2-1)*2.2}deg) translateY(-${window.innerHeight * (0.50 + Math.random()*0.20)}px)`;
  }, 900);
  setTimeout(() => el.remove(), 11000);
}

function pinScrawl(txt) {
  if (!scrawlsEl) return;
  const el = document.createElement('div');
  el.className = 'scrawl';
  el.style.left = `${window.innerWidth * (0.12 + Math.random() * 0.76)}px`;
  el.style.top = `${window.innerHeight * (0.18 + Math.random() * 0.56)}px`;
  el.style.setProperty('--r', `${(Math.random() * 2 - 1) * 3.2}deg`);
  el.innerHTML = `<div class="meta">a note you left</div><div class="txt">${escapeHtml(txt)}</div>`;
  scrawlsEl.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  // keep a small “wall” of notes
  while (scrawlsEl.children.length > 7) scrawlsEl.removeChild(scrawlsEl.firstChild);
  // fade gently after a while
  setTimeout(() => { el.style.opacity = '0.0'; el.style.filter = 'blur(2px)'; }, 22000);
  setTimeout(() => { try { el.remove(); } catch(e) {} }, 26000);
}

submitNoteBtn.addEventListener('click', async (e) => {
  e.stopPropagation();
  const txt = (noteEl.value || '').trim();
  if (!txt) return;
  await startAudio();
  const card = { t: Date.now(), txt };
  notes.push(card);
  notes = notes.slice(-32);
  saveNotes(notes);
  renderNotes();
  noteEl.value = '';
  floatCard(txt);
  pinScrawl(txt);
  bumpContribution(1);
  // The past edits the sound.
  if (themeEngine && themeEngine.applyNote) themeEngine.applyNote(txt);
  // Narrative + mood shift based on note tone.
  const sent = sentimentScore(txt);
  nudgeMood(sent < 0 ? -0.25 : 0.18);
  narrativePush(sent < 0
    ? 'some things were heavy. the sky remembers anyway.'
    : 'you wrote it down. the day shifts a little kinder.'
  );
}, { passive: false });

function narrativePush(text) {
  if (!narrativeEl) return;
  narrativeEl.textContent = text;
  narrativeEl.classList.add('show');
  setTimeout(() => narrativeEl.classList.remove('show'), 5200);
}

function sentimentScore(s) {
  const t = String(s || '').toLowerCase();
  const neg = ['hate','sorry','regret','alone','miss','lost','cry','hurt','pain','broken','angry','ashamed','tired','empty','bad','worse','fear','scared'];
  const pos = ['love','okay','safe','proud','thank','thanks','warm','home','gentle','bright','hope','better','calm','peace','happy','glad','beautiful','forgive'];
  let score = 0;
  for (const w of neg) if (t.includes(w)) score -= 1;
  for (const w of pos) if (t.includes(w)) score += 1;
  return Math.max(-3, Math.min(3, score));
}

noteEl.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    submitNoteBtn.click();
  }
});

clearNotesBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  notes = [];
  saveNotes(notes);
  renderNotes();
}, { passive: false });

// Narrative fragments: show occasionally, but now tied to actions (notes/painting) more than timers.
</script>
</body>
</html>
